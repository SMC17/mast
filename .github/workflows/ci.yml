name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build (ReleaseSmall)
        run: zig build -Doptimize=ReleaseSmall

      - name: Binary size + sanity
        run: |
          ls -la zig-out/bin/mast
          ./zig-out/bin/mast --version
          ./zig-out/bin/mast --help

      - name: Smoke — M-x dispatch round-trip
        run: |
          OUTPUT=$(printf 'M-x pid\nM-x (+ 2 40)\nM-x exit\n' | ./zig-out/bin/mast 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "→ 42" || (echo "FAIL: Janet (+ 2 40) eval did not return 42"; exit 1)
          echo "$OUTPUT" | grep -q "(exiting)" || (echo "FAIL: exit verb did not fire"; exit 1)

      - name: Smoke — file buffer round-trip
        run: |
          OUTPUT=$(printf 'M-x buffer-name\nM-x display\nM-x exit\n' | ./zig-out/bin/mast README.md 2>&1)
          echo "$OUTPUT" | grep -q "README.md" || (echo "FAIL: buffer-name not rendered"; exit 1)
          echo "$OUTPUT" | grep -q "\[:file\]" || (echo "FAIL: display did not render :file kind"; exit 1)

      - name: Unit tests (buffer protocol)
        run: zig build test --summary all

      - name: Smoke — file-write round-trip (save-as + append + save)
        run: |
          TMP=$(mktemp /tmp/mast-ci-write.XXXXXX)
          rm -f "$TMP"
          OUTPUT=$(printf 'M-x save-as %s\nM-x append hello from ci\nM-x append second line\nM-x save\nM-x exit\n' "$TMP" | ./zig-out/bin/mast 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "wrote .* bytes to $TMP" || (echo "FAIL: save did not report bytes written"; exit 1)
          [ -f "$TMP" ] || (echo "FAIL: $TMP not created"; exit 1)
          grep -q "^hello from ci$" "$TMP" || (echo "FAIL: first appended line not in saved file"; exit 1)
          grep -q "^second line$" "$TMP" || (echo "FAIL: second appended line not in saved file"; exit 1)
          rm -f "$TMP"

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build (ReleaseSmall, arm64)
        run: zig build -Doptimize=ReleaseSmall

      - name: Binary sanity (Mach-O arm64)
        run: |
          file zig-out/bin/mast
          ./zig-out/bin/mast --version

      - name: Smoke — M-x dispatch round-trip
        run: |
          OUTPUT=$(printf 'M-x pid\nM-x (+ 2 40)\nM-x exit\n' | ./zig-out/bin/mast 2>&1)
          echo "$OUTPUT" | grep -q "→ 42" || (echo "FAIL: Janet eval"; exit 1)

      - name: Unit tests (buffer protocol)
        run: zig build test --summary all

      - name: Smoke — file-write round-trip
        run: |
          TMP=$(mktemp /tmp/mast-ci-write.XXXXXX)
          rm -f "$TMP"
          OUTPUT=$(printf 'M-x save-as %s\nM-x append hello from mac ci\nM-x save\nM-x exit\n' "$TMP" | ./zig-out/bin/mast 2>&1)
          echo "$OUTPUT" | grep -q "wrote .* bytes to $TMP" || (echo "FAIL: save not reported"; exit 1)
          grep -q "^hello from mac ci$" "$TMP" || (echo "FAIL: appended line not in file"; exit 1)
          rm -f "$TMP"
